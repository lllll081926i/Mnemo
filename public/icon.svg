<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 主背景渐变 -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E" />
      <stop offset="100%" stop-color="#16213E" />
    </linearGradient>

    <!-- 主图形渐变（深蓝到霓虹紫） -->
    <linearGradient id="primaryGradient" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#4FACFE" />
      <stop offset="40%" stop-color="#667EEA" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>

    <!-- 内发光渐变 -->
    <radialGradient id="innerGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0" />
    </radialGradient>

    <!-- 折光高光线 -->
    <linearGradient id="highlightLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.1" />
    </linearGradient>

    <!-- 底部的微妙投影 -->
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- 圆角背景底板 -->
  <rect x="32" y="32" width="960" height="960" rx="216" ry="216" fill="url(#bgGradient)" />

  <!-- 内发光圈层 1 -->
  <rect x="32" y="32" width="960" height="960" rx="216" ry="216" fill="url(#innerGlow)" />

  <!-- 内发光圈层 2（细腻光泽） -->
  <rect x="48" y="48" width="928" height="928" rx="200" ry="200" fill="none" stroke="#A855F7" stroke-opacity="0.08" stroke-width="2" />

  <!-- ====== 主 Logo 图形：折纸 “M” ====== -->
  <g filter="url(#shadow)">
    <!-- 左侧记忆模块（左侧三角形面，代表信息存储） -->
    <path
      d="M 280 680 L 420 340 L 512 480 L 512 680 Z"
      fill="url(#primaryGradient)"
      opacity="0.9" />

    <!-- 右侧记忆模块（右侧三角形面，代表信息检索/读取） -->
    <path
      d="M 512 480 L 604 340 L 744 680 L 512 680 Z"
      fill="url(#primaryGradient)"
      opacity="0.75" />

    <!-- 中间折痕上部的发光高光面 -->
    <path
      d="M 420 340 L 512 480 L 604 340 L 512 200 Z"
      fill="url(#primaryGradient)"
      opacity="0.95" />

    <!-- 中间折痕左侧高光锐利切线 -->
    <path
      d="M 420 340 L 512 480 L 512 200 Z"
      fill="#FFFFFF"
      opacity="0.12" />

    <!-- 中央核心折光线（垂直骨干） -->
    <path
      d="M 512 200 L 512 680"
      stroke="url(#highlightLine)"
      stroke-width="4"
      stroke-linecap="round"
      fill="none"
      opacity="0.9" />

    <!-- 左侧折痕斜面 -->
    <path
      d="M 420 340 L 280 680"
      stroke="#FFFFFF"
      stroke-width="2"
      stroke-linecap="round"
      opacity="0.08"
      fill="none" />

    <!-- 右侧折痕斜面 -->
    <path
      d="M 604 340 L 744 680"
      stroke="#FFFFFF"
      stroke-width="2"
      stroke-linecap="round"
      opacity="0.05"
      fill="none" />

    <!-- 顶部折痕切面（水平折线） -->
    <path
      d="M 420 340 L 512 200 L 604 340"
      stroke="#FFFFFF"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      opacity="0.15" />

    <!-- 左下棱线微光 -->
    <path
      d="M 280 680 L 512 680"
      stroke="#FFFFFF"
      stroke-width="2"
      stroke-linecap="round"
      opacity="0.06"
      fill="none" />
  </g>

  <!-- 底部坐标点装饰（极致简约暗示“根”与“连接”） -->
  <circle cx="512" cy="760" r="3" fill="#4FACFE" opacity="0.4" />
  <circle cx="512" cy="770" r="2" fill="#667EEA" opacity="0.2" />
</svg>
