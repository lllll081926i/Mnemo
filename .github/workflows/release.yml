name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Windows
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build Windows Package
        env:
          REQUIRED_RELEASE_SECRETS: ALIYUN_APP_ID,ALIYUN_APP_SECRET,BAIDU_APP_ID,BAIDU_APP_SECRET,CLOUD123_APP_ID,CLOUD123_APP_SECRET,DRIVE115_APP_ID,DRIVE115_APP_SECRET,DROPBOX_APP_KEY,ONEDRIVE_CLIENT_ID,BOX_CLIENT_ID,PIKPAK_CLIENT_ID,PIKPAK_CLIENT_SECRET,GUANGYA_CLIENT_ID,CLOUD189_APP_ID
          ALIYUN_APP_ID: ${{ secrets.ALIYUN_APP_ID }}
          ALIYUN_APP_SECRET: ${{ secrets.ALIYUN_APP_SECRET }}
          BAIDU_APP_ID: ${{ secrets.BAIDU_APP_ID }}
          BAIDU_APP_SECRET: ${{ secrets.BAIDU_APP_SECRET }}
          BAIDU_PCS_APP_ID: ${{ secrets.BAIDU_PCS_APP_ID }}
          CLOUD123_APP_ID: ${{ secrets.CLOUD123_APP_ID }}
          CLOUD123_APP_SECRET: ${{ secrets.CLOUD123_APP_SECRET }}
          DRIVE115_APP_ID: ${{ secrets.DRIVE115_APP_ID }}
          DRIVE115_APP_SECRET: ${{ secrets.DRIVE115_APP_SECRET }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          BOX_CLIENT_ID: ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
          PIKPAK_CLIENT_ID: ${{ secrets.PIKPAK_CLIENT_ID }}
          PIKPAK_CLIENT_SECRET: ${{ secrets.PIKPAK_CLIENT_SECRET }}
          GUANGYA_CLIENT_ID: ${{ secrets.GUANGYA_CLIENT_ID }}
          CLOUD189_APP_ID: ${{ secrets.CLOUD189_APP_ID }}
          SUBTITLE_SEARCH_API_KEY: ${{ secrets.SUBTITLE_SEARCH_API_KEY }}
          SUBTITLE_DOWNLOAD_API_KEY: ${{ secrets.SUBTITLE_DOWNLOAD_API_KEY }}
          MNEMO_AI_API_URL: ${{ secrets.MNEMO_AI_API_URL }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          NODE_OPTIONS: --max-old-space-size=6144
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          node scripts/generate-secrets.mjs --mode=ci --strict
          npm run build
          if ('${{ startsWith(github.ref, 'refs/tags/') }}' -eq 'true') {
            npx electron-builder --win --publish always
          } else {
            npx electron-builder --win --publish never
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mnemo-windows-${{ github.ref_name }}
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

      - name: Generate GitHub Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          release_doc="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "${release_doc}" ]]; then
            cp "${release_doc}" release-notes.md
          else
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${GITHUB_REF_NAME}" \
              --jq .body > release-notes.md
          fi
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Mnemo ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --prerelease \
            --draft=false
