name: Build Multi-Platform Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22.12.0'
  NODE_OPTIONS: --max-old-space-size=6144

permissions:
  contents: read

jobs:
  test:
    name: Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies with retry
        shell: bash
        run: |
          set -euo pipefail
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 300000
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi
            if [[ "${attempt}" == '3' ]]; then
              echo 'npm ci failed after 3 attempts' >&2
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "npm ci failed; retrying in ${sleep_seconds}s" >&2
            sleep "${sleep_seconds}"
          done

      - name: Generate secrets placeholders
        run: node scripts/generate-secrets.mjs --mode=ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  build:
    name: ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 + arm64
            os: windows-latest
            platform: win
            args: --win --x64 --arm64
            artifact: mnemo-windows
            path: |
              release/*.exe
              release/*.blockmap
              release/latest*.yml

          - name: Linux x64 + arm64
            os: ubuntu-latest
            platform: linux
            args: --linux --x64 --arm64
            artifact: mnemo-linux
            path: |
              release/*.AppImage
              release/*.deb
              release/*.pacman
              release/*.blockmap
              release/latest*.yml

          - name: macOS x64 + arm64
            os: macos-latest
            platform: mac
            args: --mac --x64 --arm64
            artifact: mnemo-macos
            path: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest*.yml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies with retry
        shell: bash
        run: |
          set -euo pipefail
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 300000
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi
            if [[ "${attempt}" == '3' ]]; then
              echo 'npm ci failed after 3 attempts' >&2
              exit 1
            fi
            sleep_seconds=$((attempt * 15))
            echo "npm ci failed; retrying in ${sleep_seconds}s" >&2
            sleep "${sleep_seconds}"
          done

      - name: Install Linux packaging tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm fakeroot dpkg

      - name: Generate secrets and build packages
        env:
          REQUIRED_RELEASE_SECRETS: ONEDRIVE_CLIENT_ID,ONEDRIVE_CLIENT_SECRET,DROPBOX_APP_KEY,DROPBOX_APP_SECRET,GOOGLE_DRIVE_CLIENT_ID,GOOGLE_DRIVE_CLIENT_SECRET
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
          SUBTITLE_SEARCH_API_KEY: ${{ secrets.SUBTITLE_SEARCH_API_KEY }}
          SUBTITLE_DOWNLOAD_API_KEY: ${{ secrets.SUBTITLE_DOWNLOAD_API_KEY }}
          # Windows code signing (optional)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # macOS signing / notarization (optional; unsigned when missing)
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* && "${GITHUB_REF_NAME}" != *preview* && "${GITHUB_REF_NAME}" != *beta* && "${GITHUB_REF_NAME}" != *rc* && "${GITHUB_REF_NAME}" != *alpha* ]]; then
            node scripts/generate-secrets.mjs --mode=ci --strict
          else
            node scripts/generate-secrets.mjs --mode=ci
          fi
          npm run build
          npx electron-builder ${{ matrix.args }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          path: ${{ matrix.path }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mnemo-*-${{ github.ref_name }}
          path: release-assets
          merge-multiple: true

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#  release-assets/#  #' > release-assets/SHA256SUMS.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          release_doc="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "${release_doc}" ]]; then
            cp "${release_doc}" release-notes.md
          else
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${GITHUB_REF_NAME}" \
              --jq .body > release-notes.md || echo "Mnemo ${GITHUB_REF_NAME}" > release-notes.md
          fi

          is_prerelease='false'
          if [[ "${GITHUB_REF_NAME}" == *preview* || "${GITHUB_REF_NAME}" == *beta* || "${GITHUB_REF_NAME}" == *rc* || "${GITHUB_REF_NAME}" == *alpha* ]]; then
            is_prerelease='true'
          fi

          if ! gh release view "${tag}" >/dev/null 2>&1; then
            if [[ "${is_prerelease}" == 'true' ]]; then
              gh release create "${tag}" --verify-tag --title="Mnemo ${tag}" --notes-file=release-notes.md --prerelease
            else
              gh release create "${tag}" --verify-tag --title="Mnemo ${tag}" --notes-file=release-notes.md --latest
            fi
          fi

          release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq .id)
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -f name="Mnemo ${tag}" \
            -F body=@release-notes.md \
            -f draft=false \
            -f prerelease="${is_prerelease}" \
            -f make_latest="$([[ "${is_prerelease}" == 'true' ]] && echo false || echo true)" >/dev/null

          find release-assets -maxdepth 1 -type f -print0 \
            | xargs -0 gh release upload "${tag}" --clobber
