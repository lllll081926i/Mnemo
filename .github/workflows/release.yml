name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Windows
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build Windows Package
        env:
          REQUIRED_RELEASE_SECRETS: ALIYUN_APP_ID,ALIYUN_APP_SECRET,PIKPAK_CLIENT_ID,PIKPAK_CLIENT_SECRET,GUANGYA_CLIENT_ID,CLOUD189_APP_ID,ONEDRIVE_CLIENT_ID,ONEDRIVE_CLIENT_SECRET,DROPBOX_APP_KEY,DROPBOX_APP_SECRET,GOOGLE_DRIVE_CLIENT_ID,GOOGLE_DRIVE_CLIENT_SECRET
          ALIYUN_APP_ID: ${{ secrets.ALIYUN_APP_ID }}
          ALIYUN_APP_SECRET: ${{ secrets.ALIYUN_APP_SECRET }}
          PIKPAK_CLIENT_ID: ${{ secrets.PIKPAK_CLIENT_ID }}
          PIKPAK_CLIENT_SECRET: ${{ secrets.PIKPAK_CLIENT_SECRET }}
          GUANGYA_CLIENT_ID: ${{ secrets.GUANGYA_CLIENT_ID }}
          CLOUD189_APP_ID: ${{ secrets.CLOUD189_APP_ID }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
          SUBTITLE_SEARCH_API_KEY: ${{ secrets.SUBTITLE_SEARCH_API_KEY }}
          SUBTITLE_DOWNLOAD_API_KEY: ${{ secrets.SUBTITLE_DOWNLOAD_API_KEY }}
          MNEMO_AI_API_URL: ${{ secrets.MNEMO_AI_API_URL }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          NODE_OPTIONS: --max-old-space-size=6144
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $isTag = '${{ startsWith(github.ref, 'refs/tags/') }}' -eq 'true'
          $isPreview = $isTag -and ('${{ github.ref_name }}' -match 'preview|beta|rc|alpha')
          if ($isTag -and -not $isPreview) {
            node scripts/generate-secrets.mjs --mode=ci --strict
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            # Preview / manual builds may ship with empty OAuth placeholders when repo secrets are incomplete.
            node scripts/generate-secrets.mjs --mode=ci
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          npm run build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($isTag) {
            npx electron-builder --win --publish always
          } else {
            npx electron-builder --win --publish never
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mnemo-windows-${{ github.ref_name }}
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

      - name: Generate GitHub Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          release_doc="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "${release_doc}" ]]; then
            cp "${release_doc}" release-notes.md
          else
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${GITHUB_REF_NAME}" \
              --jq .body > release-notes.md
          fi
          is_prerelease=false
          if [[ "${GITHUB_REF_NAME}" == *preview* || "${GITHUB_REF_NAME}" == *beta* || "${GITHUB_REF_NAME}" == *rc* || "${GITHUB_REF_NAME}" == *alpha* ]]; then
            is_prerelease=true
          fi
          # Avoid gh release edit 422 tag_name conflicts with electron-builder; use GitHub Release API PATCH.
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" --jq .id)"
          if [[ "${is_prerelease}" == "true" ]]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -f name="Mnemo ${GITHUB_REF_NAME}" \
              -F body=@release-notes.md \
              -f draft=false \
              -f prerelease=true \
              -f make_latest=false >/dev/null
          else
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -f name="Mnemo ${GITHUB_REF_NAME}" \
              -F body=@release-notes.md \
              -f draft=false \
              -f prerelease=false \
              -f make_latest=true >/dev/null
          fi
